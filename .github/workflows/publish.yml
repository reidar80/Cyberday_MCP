name: Publish to npm

# Fires when you publish a GitHub Release. The release tag drives the
# package version — the workflow syncs `package.json` to match the tag,
# publishes to npm with provenance, then commits the bump back to the
# default branch.
#
# Usage:
#   1. Go to the repo's Releases tab → "Draft a new release"
#   2. Pick a new tag like v0.1.2 (or v1.0.0-rc.1 for a prerelease)
#   3. Click "Publish release"
#   That's it — the workflow handles the package.json bump and npm publish.
#
# `workflow_dispatch` is also wired up so you can re-run the publish for an
# existing tag without re-creating the GitHub release (handy if a publish
# fails for a credential reason and you fix the token).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.2)'
        required: true
        type: string

permissions:
  contents: write   # to commit the bumped package.json back to default branch
  id-token: write   # to mint the npm provenance attestation via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag '$TAG' is not valid semver (expected vMAJOR.MINOR.PATCH, optionally with -prerelease)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (from tag $TAG)"

      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync package.json to release version
        run: |
          npm version \
            --no-git-tag-version \
            --allow-same-version \
            "${{ steps.tag.outputs.version }}"

      - name: Install dependencies (also runs build via `prepare`)
        run: npm ci

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump back to default branch
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "package.json already at ${{ steps.tag.outputs.version }} — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.tag.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
